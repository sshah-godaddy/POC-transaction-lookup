<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FABI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      width: 700px;
      max-width: 95vw;
      height: 640px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .chat-header {
      padding: 10px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .chat-header-title {
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      letter-spacing: 0.04em;
    }

    #folder-btn {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      color: #6b7280;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #folder-btn:hover { background: #f3f4f6; border-color: #9ca3af; color: #374151; }
    #folder-btn.connected { background: #f0fdf4; border-color: #86efac; color: #15803d; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.user .bubble {
      background: #111827;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
      border: 1px solid #e5e7eb;
    }

    .message.bot.cmd-transaction .bubble {
      background: #f0fdf4;
      border-color: #86efac;
      color: #15803d;
    }
    .message.user.cmd-transaction .bubble {
      background: #16a34a;
      color: #ffffff;
    }

    .cmd-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #16a34a;
      margin-bottom: 4px;
      padding: 0 2px;
    }

    .file-saved-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #15803d;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      margin-top: 6px;
    }

    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.9); }
      40% { opacity: 1; transform: scale(1); }
    }

    .message.bot.error .bubble {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #b91c1c;
    }

    .chat-input-area {
      border-top: 1px solid #e5e7eb;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #ffffff;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .slash-badge {
      display: none;
      position: absolute;
      top: 8px;
      left: 10px;
      background: #dcfce7;
      color: #15803d;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid #86efac;
      pointer-events: none;
      white-space: nowrap;
      z-index: 1;
    }
    .slash-badge.visible { display: inline-block; }

    #chat-input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s, background 0.15s;
      color: #111827;
      background: #ffffff;
    }
    #chat-input:focus { border-color: #9ca3af; }
    #chat-input.cmd-active { border-color: #86efac; background: #f0fdf4; padding-top: 32px; }
    #chat-input.cmd-active:focus { border-color: #4ade80; }
    #chat-input::placeholder { color: #9ca3af; }
    #chat-input:disabled { opacity: 0.5; cursor: not-allowed; }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      padding: 0 4px 2px;
      margin-top: 2px;
    }
    .hint span { color: #16a34a; font-weight: 500; }

    #send-btn {
      background: #111827;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      height: 40px;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: #374151; }
    #send-btn:active:not(:disabled) { background: #1f2937; }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span class="chat-header-title">FABI</span>
      <button id="folder-btn" onclick="pickSaveFolder()">Connect folder</button>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot">
        <div class="bubble">Hi! I'm FABI, your GoDaddy care assistant. Type <strong>\transaction-lookup</strong> to start a transaction search.</div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="input-wrapper">
        <span class="slash-badge" id="slash-badge">\transaction-lookup</span>
        <textarea id="chat-input" rows="1" placeholder="Message..."></textarea>
        <div class="hint" id="hint"></div>
      </div>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const CMD     = '\\transaction-lookup';
    const API_URL = 'https://caas-gocode-prod.caas-prod.prod.onkatana.net/chat/completions';
    const MODEL   = 'claude-sonnet-4-6';
    const API_KEY = (typeof CONFIG !== 'undefined') ? CONFIG.API_KEY : '';

    const input      = document.getElementById('chat-input');
    const messages   = document.getElementById('messages');
    const sendBtn    = document.getElementById('send-btn');
    const slashBadge = document.getElementById('slash-badge');
    const hint       = document.getElementById('hint');

    const SYSTEM_PROMPT = `You are FABI, an AI assistant for GoDaddy's customer care team. You help care agents look up customer transactions in the payments database.

TRANSACTION LOOKUP WORKFLOW (triggered by \\transaction-lookup):

STEP 1 — GATHER
Ask for transaction details conversationally. Extract any fields the agent mentions naturally (e.g. "charge of $12.99 on June 3rd").

Do NOT ask for or require the last 4 digits of the card at this stage.

Narrow fields (need at least 1 to run a search):
• date_of_transaction — format YYYY-MM-DD
• usd_total — USD charge amount as a number (e.g. 12.99)
• local_total — local currency amount as a number
• card_bin — first 6 digits of the card (strongest identifier)

For PayPal: collect paypal_transaction_id or paypal_invoice_id (first 10 characters).

Broad fields (optional, collected only if the agent mentions them):
• transaction_currency — e.g. "USD", "EUR"
• billing_country — e.g. "US"
• payment_method — e.g. "credit_card", "paypal", "apple_pay"
• bank_name — e.g. "Chase"
• billing_first_name
• billing_last_name

STEP 2 — VALIDATE
• If no fields at all → ask for at least the date or charge amount
• If the combination seems too broad (likely >10 matches) → ask a follow-up question before outputting

STEP 3 — OUTPUT SEARCH REQUEST
Once you have at least one narrow field:
1. Briefly confirm what you captured (one sentence)
2. Output a \`\`\`json code block containing ONLY the fields provided, using the exact field names above

STEP 4 — VERIFY WITH LAST 4 DIGITS
After outputting the search JSON, tell the agent: "Please ask the customer for the last 4 digits of their card to confirm the result matches."
Then wait for the agent to provide the last 4 digits (card_last_four). Once provided, output a second \`\`\`json code block with just: { "card_last_four": "<value>" } and confirm the verification is ready to run.

CRITICAL: Never include shopper_id in any output under any circumstances.
FORMATTING: Use plain text only. No emojis. No markdown bold (**text**), italics, or any other markdown formatting.
For general questions (no \\transaction-lookup command), be a concise, helpful assistant.`;

    const history = [
      { role: 'system', content: SYSTEM_PROMPT }
    ];

    const CMD_SHORT = '\\TL';

    function isCmd(text) {
      const t = text.trimStart();
      return t.startsWith(CMD) || t.startsWith(CMD_SHORT);
    }

    function updateInputState() {
      const val = input.value;
      if (isCmd(val)) {
        input.classList.add('cmd-active');
        slashBadge.classList.add('visible');
        hint.innerHTML = '<span>\\transaction-lookup</span> active — transaction search mode';
      } else {
        input.classList.remove('cmd-active');
        slashBadge.classList.remove('visible');
        hint.textContent = '';
      }
      autoResize();
    }

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }

    input.addEventListener('input', updateInputState);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    sendBtn.addEventListener('click', send);

    let dirHandle = null;

    async function pickSaveFolder() {
      try {
        dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        const btn = document.getElementById('folder-btn');
        btn.textContent = dirHandle.name;
        btn.classList.add('connected');
      } catch (e) {
        if (e.name !== 'AbortError') console.error('Folder access error:', e);
      }
    }

    async function saveJson(jsonStr) {
      const parsed = JSON.parse(jsonStr);
      const formatted = JSON.stringify(parsed, null, 2);

      if (dirHandle) {
        try {
          const fileHandle = await dirHandle.getFileHandle('request-info.json', { create: true });
          const writable = await fileHandle.createWritable();
          await writable.write(formatted);
          await writable.close();
          return 'saved';
        } catch (e) {
          console.error('Write error:', e);
        }
      }

      // Fallback: browser download if no folder connected
      const blob = new Blob([formatted], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'request-info.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      return 'downloaded';
    }

    function renderBotContent(bubble, text) {
      const parts = text.split(/(```[\w]*\n[\s\S]*?```)/g);
      parts.forEach(part => {
        const codeMatch = part.match(/^```(\w*)\n([\s\S]*?)```$/);
        if (codeMatch && codeMatch[1] === 'json') {
          saveJson(codeMatch[2]).then(result => {
            const chip = document.createElement('div');
            chip.className = 'file-saved-chip';
            chip.textContent = result === 'saved'
              ? 'request-info.json updated in ' + (dirHandle ? dirHandle.name : 'folder')
              : 'request-info.json downloaded';
            bubble.appendChild(chip);
            messages.scrollTop = messages.scrollHeight;
          }).catch(() => {});
        } else if (part) {
          const span = document.createElement('span');
          span.textContent = part;
          bubble.appendChild(span);
        }
      });
    }

    function addMessage(text, role, isTransaction, extraClass) {
      const wrap = document.createElement('div');
      wrap.className = `message ${role}${isTransaction ? ' cmd-transaction' : ''}${extraClass ? ' ' + extraClass : ''}`;

      if (isTransaction && role === 'bot') {
        const label = document.createElement('div');
        label.className = 'cmd-label';
        label.textContent = '\\transaction-lookup';
        wrap.appendChild(label);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'bot') {
        renderBotContent(bubble, text);
      } else {
        bubble.textContent = text;
      }

      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'message bot typing';
      wrap.id = 'typing-indicator';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      wrap.appendChild(bubble);
      messages.appendChild(wrap);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function callAPI(userMessage, isTransaction) {
      const rawArgs = userMessage.replace(CMD, '').replace(CMD_SHORT, '').trim();
      const content = isTransaction
        ? `The care agent initiated \\transaction-lookup${rawArgs ? ` with this initial info: "${rawArgs}"` : ''}. Begin the transaction lookup workflow: greet briefly, extract any fields already provided, confirm what you captured, then ask for any missing required fields (card_last_four is always required unless PayPal).`
        : userMessage;

      history.push({ role: 'user', content });
      addTyping();
      setLoading(true);

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`,
          },
          body: JSON.stringify({ model: MODEL, messages: history, temperature: 0.7, stream: false }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err?.error?.message || `HTTP ${res.status}`);
        }

        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content?.trim() || '(empty response)';
        history.push({ role: 'assistant', content: reply });

        removeTyping();
        addMessage(reply, 'bot', isTransaction);
      } catch (err) {
        removeTyping();
        addMessage(`Error: ${err.message}`, 'bot', false, 'error');
        history.pop();
      } finally {
        setLoading(false);
      }
    }

    function setLoading(on) {
      input.disabled = on;
      sendBtn.disabled = on;
    }

    function send() {
      const text = input.value.trim();
      if (!text || input.disabled) return;

      const transaction = isCmd(text);
      addMessage(text, 'user', transaction);

      input.value = '';
      input.style.height = 'auto';
      input.classList.remove('cmd-active');
      slashBadge.classList.remove('visible');
      hint.textContent = '';

      callAPI(text, transaction);
    }
  </script>
</body>
</html>
